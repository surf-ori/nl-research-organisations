name: Deploy read-only app to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Prepare bundled data
        run: bash apps/build_public.sh

      - name: Export app to WASM
        run: |
          uv run --with marimo marimo export html-wasm apps/dashboard.py \
            -o _site --mode run --no-show-code --sandbox -f

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
